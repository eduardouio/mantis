{% extends "base/base.html" %}
{% load static %}

{% block style %}
<style>
  /* ── Árbol de documentos ──────────────────────────────────────── */
  .tree-node { margin-left: 1.85rem; }
  .tree-root > .tree-node { margin-left: 0; }

  .tree-toggle {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.75rem;
    border-radius: 0.375rem;
    transition: background 150ms;
  }
  .tree-toggle:hover { background: oklch(var(--b2)); }

  .tree-children { display: none; }
  .tree-children.open { display: block; }

  .tree-chevron {
    transition: transform 200ms;
    font-size: 1.25rem;
    color: #888;
    width: 1.5rem;
    text-align: center;
  }
  .tree-chevron.rotated { transform: rotate(90deg); }

  /* indicador de archivo cargado */
  .file-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 1rem;
    padding: 0.15rem 0.6rem;
    border-radius: 0.375rem;
  }
  .file-badge.has-file   { background: #d1fae5; color: #065f46; }
  .file-badge.no-file    { background: #fee2e2; color: #991b1b; }

  /* Tabla de archivos */
  .file-table { width: 100%; border-collapse: collapse; margin-top: 0.35rem; }
  .file-table td { padding: 0.4rem 0.75rem; font-size: 1.05rem; border-bottom: 1px solid #e5e7eb; }
  .file-table tr:last-child td { border-bottom: none; }

  /* Loading skeleton */
  .skeleton-line {
    height: 1rem;
    border-radius: 0.25rem;
    background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Tabs activos */
  .fm-tab {
    font-size: 1.05rem;
    font-weight: 500;
    padding: 0.85rem 1.5rem;
    transition: all 200ms;
    border-bottom: 3px solid transparent;
  }
  .fm-tab:hover {
    background: oklch(var(--b2));
  }
  .fm-tab.tab-active {
    border-bottom: 4px solid oklch(var(--p));
    color: oklch(var(--p));
    font-weight: 700;
    background: oklch(var(--p) / 0.06);
  }
</style>
{% endblock %}

{% block content %}
<div class="w-[95%] mx-auto py-4" id="fileManagerApp">

  <!-- ── Header ──────────────────────────────────────────────── -->
  <div class="bg-white rounded-lg shadow-md p-5 mb-4 border border-gray-200">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
      <div class="flex items-center gap-3">
        <i class="las la-folder-open text-4xl text-blue-500"></i>
        <h1 class="text-2xl font-bold text-gray-800">Gestor de Documentos</h1>
      </div>
      <div class="flex gap-2 items-center w-full md:w-auto">
        <div class="relative flex-1 md:w-96">
          <i class="las la-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
          <input type="text" id="searchInput" placeholder="Buscar por nombre, cédula, placa..."
                 class="input input-bordered input-md w-full pl-10" />
        </div>
        <button class="btn btn-md btn-outline" onclick="collapseAll()">
          <i class="las la-compress-arrows-alt text-lg"></i>
        </button>
        <button class="btn btn-md btn-outline" onclick="expandAll()">
          <i class="las la-expand-arrows-alt text-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Tabs de categorías ──────────────────────────────────── -->
  <div class="bg-white rounded-lg shadow-md border border-gray-200">
    <div class="border-b border-gray-200">
      <div class="flex overflow-x-auto">
        <button class="fm-tab tab-active" data-tab="technicals" onclick="switchTab('technicals')">
          <i class="las la-users mr-1 text-xl"></i> Técnicos
        </button>
        <button class="fm-tab" data-tab="vehicles" onclick="switchTab('vehicles')">
          <i class="las la-truck mr-1 text-xl"></i> Vehículos
        </button>
        <button class="fm-tab" data-tab="equipment" onclick="switchTab('equipment')">
          <i class="las la-desktop mr-1 text-xl"></i> Equipos
        </button>
        <button class="fm-tab" data-tab="projects" onclick="switchTab('projects')">
          <i class="las la-project-diagram mr-1 text-xl"></i> Proyectos
        </button>
      </div>
    </div>

    <!-- ── Área del árbol ──────────────────────────────────── -->
    <div class="p-5 min-h-[500px]" id="treeContainer">
      <!-- Skeleton loading -->
      <div id="loadingSkeleton" class="space-y-3">
        <div class="skeleton-line w-3/4" style="height:1.2rem"></div>
        <div class="skeleton-line w-1/2 ml-5" style="height:1rem"></div>
        <div class="skeleton-line w-2/3 ml-5" style="height:1rem"></div>
        <div class="skeleton-line w-3/4" style="height:1.2rem"></div>
        <div class="skeleton-line w-1/2 ml-5" style="height:1rem"></div>
        <div class="skeleton-line w-5/6" style="height:1.2rem"></div>
        <div class="skeleton-line w-2/3 ml-5" style="height:1rem"></div>
      </div>
      <div id="treeContent" class="hidden tree-root"></div>
    </div>
  </div>
</div>

<!-- ── Modal de carga ────────────────────────────────────────── -->
<dialog id="uploadModal" class="modal">
  <div class="modal-box max-w-lg">
    <h3 class="font-bold text-xl flex items-center gap-2 mb-4">
      <i class="las la-cloud-upload-alt text-blue-500 text-2xl"></i>
      Subir Archivo
    </h3>
    <div id="uploadModalBody">
      <p class="text-base text-gray-600 mb-1" id="uploadLabel"></p>
      <p class="text-sm text-gray-400 mb-3" id="uploadContext"></p>
      <input type="file" id="uploadFileInput" class="file-input file-input-bordered file-input-md w-full" />
      <div id="uploadProgressContainer" class="hidden mt-3">
        <progress class="progress progress-primary w-full" id="uploadProgress"></progress>
        <p class="text-xs text-gray-500 mt-1">Subiendo archivo...</p>
      </div>
      <div id="uploadMsg" class="mt-2 hidden"></div>
    </div>
    <div class="modal-action">
      <button class="btn btn-md" onclick="closeUploadModal()">Cancelar</button>
      <button class="btn btn-md btn-primary" id="uploadConfirmBtn" onclick="confirmUpload()">
        <i class="las la-upload mr-1"></i> Subir
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- ── Toast de notificaciones ───────────────────────────────── -->
<div id="fmToast" class="toast toast-top toast-end hidden z-50">
  <div class="alert" id="fmToastContent">
    <span id="fmToastText"></span>
  </div>
</div>

{% endblock %}

{% block script_app %}
<script src="{% static 'js/app/app-file-manager.js' %}"></script>
{% endblock %}

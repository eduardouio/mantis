{% extends 'base/base.html' %}
{% load static %}
{% block content %}
<!-- Vue se monta aquí, dentro del contenido de la página -->
<div id="vue-app"></div>
{% endblock %}
{% block script %}
{{ user_data|json_script:"project-user-data" }}
<script>
  window.djangoConfig = {
    projectId: {{ project.id }},
    cardinalPoint: "{{ project.cardinal_point|default:''|escapejs }}",
    baseUrl: "",
    csrfToken: "{{ csrf_token }}",
    userData: JSON.parse(document.getElementById("project-user-data").textContent)
  };
</script>
<script src="{% static 'js/app/app-projects.js' %}"></script>
{% endblock %}
